<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login |Delicacies app</title>
    <!-- link the bootstrap files  -->
     <link rel="stylesheet" href="css/bootstrap.css">
     <!-- script  -->
     <script src="js/bootstrap.js"></script>
</head>
<body class="bg-dark">
    <section class="row">
        <div class="col-6 offset-3">
            <!-- card  -->
             <div class="text-center m-5">
                <div class="card">
                    <div class="card-header">
                        <h4>Sign in </h4>
                    </div>
                    <div class="card-body">
                        <!-- user to enter email or phone and password login  -->
                        <form >
                        <div class="mb-3">
                           <input type="text" placeholder="enter email or phone" class="form-control">
                           
                        </div>
                         <div class="mb-3">
                            <input type="password" placeholder="enter password" class="form-control">
                         </div>
                         <button class="btn btn-primary w-100 login-btn"> Log in</button>
                         
                        </form>
                        <p class="text-center mt-3">
                            <a href="" class="">Forgot password</a>
                        </p>
                        <a href="signup.html">
                            <span class="btn btn-outline-primary w-100">Create new account</span>
                        </a>


                    </div>
                </div>
             </div>
        </div>
    </section>
    
</body>
</html>
