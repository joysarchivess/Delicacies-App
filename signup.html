<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup delicacies app</title>
    <!-- link the bootstrap files and javascript  -->
     <link rel="stylesheet" href="/css/bootstrap.css">
     <!-- script  -->
     <script src="js/bootstrap.js"></script>

</head>
<body class="bg-dark">
    <!-- Signup page  -->
    <!-- name of the company  -->
     <section class="row justify-content-center">
        <!-- columns 2  -->
        <div class="col-md-6">
            <!-- name of our company,image, -->
             <div class="text-center text-white m-5">
                <h2>Delicacies App</h2>
                <p>Welcome to <i>Delicacies app</i></p>
                <div>
                    <img src="images/pexels-olly-3811663.jpg" alt="company photo" height="300px" width="350px" class="img-fluid mt-4" style="width: 260px; border-radius: 200px;">
                </div>

             </div>
             
        </div>
        <div class="col-md-6 p-3">
            <!-- Signup section -->
            <div class="m-3">
                <!-- card -contains our signup input fields -->
                <!-- username,password,email,telephone, -->
                 <div class="card shadow">
                    <div class="card-header text-center bg-success text-white">
                        <h4>Create Account</h4>
                    </div>
                    <div class="card-body">
                        <!-- form to carry the input fields  -->
                        <form>
                            <div class="mb-3">
                                <label for="">Full Name</label>
                                <br>
                                <input type="text" placeholder=" Enter Full Name" class="form-control" >
                            </div>
                            <div class="mb-3">
                                <label for="">Email</label>
                                <br>
                                <input type="email" placeholder="Enter email">
                            </div>
                            <div class="mb-3">
                                <label for="">Phone</label>
                                <br>
                                <input type="tel" placeholder="Enter phone number" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Password</label>
                                <br>
                                <input type="password" placeholder="Enter password" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="">Confirm password</label>
                                <br>
                                <input type="password" placeholder="confirm password" class="form-control ">
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-success">register</button>
                            </div>
                        </form>
                        <p class="text-center mt-3">
                            Already have an account? <a href="signin.html">sign in</a>
                        </p>
                        <a href="index.html" class="text-end">Back home</a>
                    </div>

                 </div>
            </div>
        </div>
     </section>
    
</body>
</html>
